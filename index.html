<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rilo Analysis - 宠物综合体经营测算 v2.0</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta name="description" content="Rilo Analysis: 专业的宠物综合体财务建模工具，支持收入预测、成本分析、投资回报计算和情景分析">
  <meta name="keywords" content="Rilo Analysis,宠物综合体,经营测算,财务建模,投资回报,盈亏平衡">
  
  <!-- 外部依赖 -->
  <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://unpkg.com/dayjs@1.11.9/dayjs.min.js"></script>
  <script src="https://unpkg.com/dayjs@1.11.9/locale/zh-cn.js"></script>
  
  <!-- Ant Design CDN -->
  <link rel="stylesheet" href="https://unpkg.com/antd@5.12.8/dist/reset.css" />
  <script src="https://unpkg.com/antd@5.12.8/dist/antd.min.js"></script>
  
  <!-- 保留 Tailwind 用于自定义样式 -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  
  <!-- 自定义样式 -->
  <style>
    :root {
      /* Design tokens (minimal, can be expanded later) */
      --rilo-accent: #2563EB; /* Tailwind v2 blue-600 */
      --rilo-accent-500: #3B82F6; /* Tailwind v2 blue-500 (optional) */
      --rilo-accent-50: #EFF6FF;
      --rilo-muted: #6B7280;

      /* Optional “poetic cool” palette B (docs/design-tokens.md) */
      --rilo-ink: #0F172A; /* slate-900 */
      --rilo-fog: #F8FAFC; /* slate-50 */
      --rilo-qingdai: #2F3A4A;
      --rilo-mist-blue: #AFC4DA;

      /* === Shared Shell Tokens (aligned to v5 paper system) === */
      --rilo-bg-deep: #f3ebdf;
      --rilo-surface-1: rgba(255, 250, 245, 0.74);
      --rilo-surface-2: rgba(245, 236, 224, 0.72);
      --rilo-surface-3: rgba(233, 237, 243, 0.68);
      --rilo-surface-panel: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(247,240,231,0.92));
      --rilo-surface-card: linear-gradient(180deg, rgba(255,255,255,0.70), rgba(244,235,223,0.90));
      --rilo-surface-muted: rgba(255, 251, 246, 0.72);
      --rilo-surface-accent: linear-gradient(180deg, rgba(236,236,250,0.92), rgba(245,239,230,0.96));
      --rilo-border-deep: rgba(34, 31, 26, 0.14);
      --rilo-border-strong: rgba(34, 31, 26, 0.22);
      --rilo-text-1: var(--ink-1);
      --rilo-text-2: var(--ink-2);
      --rilo-text-3: var(--ink-3);

      /* Jewel accents */
      --rilo-brand: #221C86;
      --rilo-jewel-sapphire: #2D3A8C;
      --rilo-jewel-amethyst: #6D28D9;
      --rilo-jewel-emerald: #10B981;
      --rilo-jewel-citrine: #F59E0B;
      --rilo-jewel-ruby: #EF4444;

      /* Semantic colors (unified) */
      --rilo-sem-success: var(--emerald);
      --rilo-sem-warning: var(--amber);
      --rilo-sem-danger: var(--brick);
      --rilo-sem-info: var(--rilo-accent-v5);

      /* Radius, shadow, spacing */
      --rilo-radius-card: 16px;
      --rilo-radius-control: 12px;
      --rilo-shadow-card: 0 18px 44px rgba(85, 61, 28, 0.10);
      --rilo-shadow-soft: 0 8px 22px rgba(85, 61, 28, 0.06);
      --rilo-shadow-press: 0 12px 28px rgba(85, 61, 28, 0.12);
      --rilo-shadow-shell: 0 28px 72px rgba(85, 61, 28, 0.14);
      --rilo-gap-page: 24px;
      --rilo-gap-form: 16px;

      /* Motion */
      --rilo-motion-ease: cubic-bezier(0.2, 0.8, 0.2, 1);
      --rilo-motion-fast: 120ms;
      --rilo-motion-mid: 180ms;
      --rilo-motion-slow: 240ms;

      /* Chinese typography */
      --rilo-font-cn: "SF Pro SC", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Noto Sans SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      --rilo-leading-copy: 1.72;
      --rilo-leading-ui: 1.58;
      --rilo-tracking-cn: 0.01em;
      --rilo-tracking-tight-cn: -0.012em;

      /* === v5 Visual System: Paper + Ink + Jewel === */
      /* Paper base (warm, matte) */
      --paper-base: #f6f0e6;
      --paper-warm: #efe5d7;
      --paper-cool: #e9edf3;
      --paper-line: #ddcfbe;
      --paper-fold: #ccb9a2;

      /* Ink (text hierarchy) */
      --ink-1: #221f1a;
      --ink-2: #5f564a;
      --ink-3: #8c8275;

      /* Accent (primary brand - 深蓝) */
      --rilo-accent-v5: #221C8B;
      --rilo-accent: var(--rilo-accent-v5);
      --rilo-accent-500: #3932a5;
      --rilo-accent-50: rgba(34, 28, 139, 0.08);

      /* Semantic jewel accents (v5) */
      --emerald: #2f7d67;
      --amber: #b78128;
      --brick: #9d5b4b;
      --plum: #835b7d;

      /* Derived soft variants */
      --rilo-accent-soft-v5: rgba(34, 28, 139, 0.10);
      --rilo-accent-mid-v5: rgba(34, 28, 139, 0.18);
      --emerald-soft: rgba(47, 125, 103, 0.12);
      --amber-soft: rgba(183, 129, 40, 0.12);
      --brick-soft: rgba(157, 91, 75, 0.12);
      --plum-soft: rgba(131, 91, 125, 0.12);

      /* Lines */
      --line: rgba(34, 31, 26, 0.13);
      --line-strong: rgba(34, 31, 26, 0.22);

      /* Shadows */
      --shadow-v5: 0 26px 80px rgba(85, 61, 28, 0.12);

      /* Radius scale (v5) */
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;

      /* Spacing scale (v5) */
      --space-1: 12px;
      --space-2: 16px;
      --space-3: 20px;
      --space-4: 28px;
      --space-5: 38px;
      --space-6: 50px;
      --control-height: 42px;
      --control-height-sm: 36px;

      /* Font stack (v5) */
      --font-display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Baskerville, Georgia, serif;
      --font-sans: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", Menlo, monospace;
    }

    body {
      font-family: var(--font-sans), system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.85;
      letter-spacing: 0.02em;
      background:
        radial-gradient(circle at left top, rgba(34, 28, 139, 0.08), transparent 28%),
        radial-gradient(circle at right 8%, rgba(183, 129, 40, 0.07), transparent 24%),
        linear-gradient(180deg, #faf6ef 0%, var(--paper-base) 48%, #eee5d8 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      color: var(--ink-1);
      margin: 0;
    }

    /* 纸张纹理叠加（可选，增强质感） */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.28;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(34, 31, 26, 0.017) 0,
          rgba(34, 31, 26, 0.017) 1px,
          transparent 1px,
          transparent 7px
        );
      mix-blend-mode: multiply;
      z-index: -1;
    }

    /* 主应用容器（v5 风格） */
    #root > .app-container {
      width: min(1520px, calc(100% - 28px));
      margin: 18px auto 26px;
      border-radius: var(--radius-xl, 30px);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.16)),
        linear-gradient(135deg, rgba(246,240,230,0.98), rgba(239,229,215,0.96) 56%, rgba(233,237,243,0.90));
      box-shadow: var(--rilo-shadow-shell);
      border: 1px solid rgba(34, 31, 26, 0.10);
      min-height: calc(100vh - 48px);
      position: relative;
    }

    /* === Ant Design 主题覆盖 === */
    /* 按钮 */
    .ant-btn {
      border-radius: var(--radius-control, 12px) !important;
      border: 1px solid var(--line) !important;
      font-family: var(--font-sans) !important;
      letter-spacing: var(--rilo-tracking-cn, 0.01em);
      transition: all 0.2s var(--rilo-motion-ease) !important;
      box-shadow: none !important;
    }

    .ant-btn-primary {
      background-color: var(--rilo-accent-v5, #221C8B) !important;
      border-color: var(--rilo-accent-v5, #221C8B) !important;
      color: #fff !important;
    }

    .ant-btn-primary:hover,
    .ant-btn-primary:focus {
      background-color: rgba(34, 28, 139, 0.90) !important;
      border-color: rgba(34, 28, 139, 0.90) !important;
      box-shadow: 0 0 0 2px rgba(34, 28, 139, 0.15) !important;
    }

    .ant-btn-default:hover,
    .ant-btn-default:focus {
      border-color: var(--rilo-accent-v5, #221C8B) !important;
      box-shadow: 0 0 0 2px rgba(34, 28, 139, 0.10) !important;
    }

    /* 输入框与数字输入 */
    .ant-input,
    .ant-input-number {
      border-radius: var(--radius-control, 12px) !important;
      border: 1px solid var(--line) !important;
      font-family: var(--font-sans) !important;
      letter-spacing: var(--rilo-tracking-cn, 0.01em);
      transition: all 0.2s var(--rilo-motion-ease) !important;
      background: rgba(255,255,255,0.56) !important;
      box-shadow: none !important;
    }

    .ant-input:focus,
    .ant-input-number:focus {
      border-color: var(--rilo-accent-v5, #221C8B) !important;
      box-shadow: 0 0 0 2px rgba(34, 28, 139, 0.12) !important;
    }

    .ant-input-number-handler-wrap {
      background: transparent !important;
      border-left: 1px solid var(--line) !important;
    }

    /* 下拉选择 */
    .ant-select {
      font-family: var(--font-sans) !important;
    }

    .ant-select-selector {
      border-radius: var(--radius-control, 12px) !important;
      border: 1px solid var(--line) !important;
      background: rgba(255,255,255,0.56) !important;
      box-shadow: none !important;
      transition: all 0.2s var(--rilo-motion-ease) !important;
    }

    .ant-select-open .ant-select-selector,
    .ant-select-focused .ant-select-selector {
      border-color: var(--rilo-accent-v5, #221C8B) !important;
      box-shadow: 0 0 0 2px rgba(34, 28, 139, 0.12) !important;
    }

    /* 卡片 */
    .ant-card {
      border-radius: var(--radius-lg, 22px) !important;
      border: 1px solid var(--line) !important;
      background: rgba(255, 255, 255, 0.60) !important;
      box-shadow: var(--rilo-shadow-card, 0 8px 24px rgba(0,0,0,0.12)) !important;
      overflow: hidden;
    }

    .ant-card-head {
      border-bottom: 1px solid var(--line) !important;
      padding: var(--space-2, 16px) var(--space-4, 28px) !important;
      min-height: auto !important;
    }

    .ant-card-head-title {
      font-family: var(--font-display) !important;
      font-size: 1.125rem !important;
      font-weight: 600;
      color: var(--ink-1) !important;
      letter-spacing: 0.02em;
    }

    .ant-card-body {
      padding: var(--space-4, 28px) !important;
    }

    /* 滑块 (Slider) */
    .ant-slider {
      margin: 8px 0 !important;
    }

    .ant-slider-rail {
      background-color: rgba(34, 31, 26, 0.1) !important;
      height: 6px !important;
      border-radius: 3px !important;
    }

    .ant-slider-track {
      background-color: var(--rilo-accent-v5, #221C8B) !important;
      height: 6px !important;
      border-radius: 3px !important;
    }

    .ant-slider-handle {
      border-color: var(--rilo-accent-v5, #221C8B) !important;
      box-shadow: 0 2px 6px rgba(34, 28, 139, 0.25) !important;
      width: 18px !important;
      height: 18px !important;
      margin-top: -6px !important;
    }

    /* 折叠面板 */
    .ant-collapse-header {
      border-radius: var(--radius-md, 16px) !important;
      background: rgba(255,255,255,0.40) !important;
      border: 1px solid var(--line) !important;
      padding: var(--space-2, 16px) var(--space-4, 28px) !important;
      font-family: var(--font-sans) !important;
    }

    .ant-collapse-item {
      border: none !important;
      margin-bottom: 8px !important;
      border-radius: var(--radius-md, 16px) !important;
      overflow: hidden !important;
    }

    /* 标签页 */
    .ant-tabs {
      font-family: var(--font-sans) !important;
    }

    .ant-tabs-tab {
      padding: 8px 16px !important;
      font-size: 14px !important;
      color: var(--ink-2) !important;
      transition: all 0.2s var(--rilo-motion-ease) !important;
    }

    .ant-tabs-tab-active .ant-tabs-tab-btn {
      color: var(--rilo-accent-v5, #221C8B) !important;
      font-weight: 600 !important;
    }

    .ant-tabs-ink-bar {
      background-color: var(--rilo-accent-v5, #221C8B) !important;
      height: 2px !important;
      border-radius: 1px !important;
    }

    /* 表格 */
    .ant-table {
      font-family: var(--font-sans) !important;
      border-radius: var(--radius-md, 16px) !important;
      overflow: hidden !important;
    }

    .ant-table-thead > tr > th {
      background: var(--paper-warm, #efe5d7) !important;
      border-bottom: 1px solid var(--line) !important;
      color: var(--ink-2) !important;
      font-weight: 600 !important;
      font-size: 12px !important;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ant-table-tbody > tr > td {
      border-bottom: 1px solid var(--line) !important;
      color: var(--ink-1) !important;
      background: rgba(255,255,255,0.48) !important;
    }

    .ant-table-tbody > tr:hover > td {
      background: rgba(34, 28, 139, 0.04) !important;
    }

    /* 消息提示 */
    .ant-message {
      font-family: var(--font-sans) !important;
    }

    /* 全局滚动条美化（可选） */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--paper-base, #f6f0e6);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--ink-3);
    }

    /* 语义色工具类 */
    .text-success { color: var(--emerald) !important; }
    .text-warning { color: var(--amber) !important; }
    .text-danger { color: var(--brick) !important; }
    .text-info { color: var(--rilo-accent-v5, #221C8B) !important; }
    .text-muted { color: var(--ink-3) !important; }
    .text-secondary { color: var(--ink-2) !important; }

    /* 背景容器（卡片内 white 混合） */
    .bg-paper-base { background-color: var(--paper-base) !important; }
    .bg-paper-warm { background-color: var(--paper-warm) !important; }
    .bg-paper-cool { background-color: var(--paper-cool) !important; }
    .bg-white-mix { background: rgba(255,255,255,0.60) !important; }

    .rilo-zh-page {
      line-height: var(--rilo-leading-copy);
      letter-spacing: var(--rilo-tracking-cn);
    }

    .rilo-zh-header {
      line-height: 1.24;
      letter-spacing: var(--rilo-tracking-tight-cn);
    }

    .rilo-zh-subtle {
      line-height: var(--rilo-leading-ui);
    }

    .rilo-kpi-grid-tight {
      gap: 0.875rem;
    }
    
    /* 加载动画 */
    .loading-spinner {
      border: 2px solid #f3f4f6;
      border-top: 2px solid var(--rilo-accent);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* 错误状态样式 */
    .error-state {
      background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
    }
    
    /* 成功状态样式 */
    .success-state {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
    }
    
    /* 平滑过渡 */
    .transition-all {
      transition: all 0.3s ease;
    }
    
    /* 响应式调整 */
    @media (max-width: 640px) {
      .container {
        padding-left: 1rem;
        padding-right: 1rem;
      }
    }
    
    /* 打印样式 */
    @media print {
      .no-print {
        display: none !important;
      }
      
      body {
        background: white !important;
      }
      
      .shadow {
        box-shadow: none !important;
      }
    }

    /* Settings v3.0 布局样式 */
    .settings-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 24px;
      min-height: calc(100vh - 240px);
    }

    .settings-sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .settings-cat-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cat-item {
      display: block;
      padding: 12px 14px;
      border-radius: var(--rilo-radius-card, 16px);
      border: 1px solid var(--rilo-border-deep, #2A2622);
      background: rgba(255,255,255,0.34);
      color: inherit;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s var(--rilo-motion-ease, cubic-bezier(0.2, 0.8, 0.2, 1));
      cursor: pointer;
    }

    .cat-item.active {
      border-color: rgba(37,99,235,0.24);
      background: linear-gradient(90deg, rgba(37,99,235,0.10), rgba(255,255,255,0.42));
      box-shadow: inset 3px 0 0 var(--rilo-accent, #2563EB);
    }

    .settings-form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .feedback-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feedback-card {
      padding: 16px 18px;
      border: 1px solid var(--rilo-border-deep, #2A2622);
      border-radius: var(--rilo-radius-card, 16px);
      background: rgba(255,255,255,0.30);
    }

    .kicker {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--rilo-text-3, #8A847D);
      margin-bottom: 8px;
    }

    .small-note {
      font-size: 13px;
      line-height: 1.75;
      color: var(--rilo-text-2, #B6B0A8);
      margin-top: 6px;
    }

    /* 响应式调整 */
    @media (max-width: 768px) {
      .settings-layout {
        grid-template-columns: 1fr;
      }
      .settings-sidebar {
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 8px;
      }
      .settings-cat-nav {
        flex-direction: row;
        flex-wrap: nowrap;
      }
      .cat-item {
        white-space: nowrap;
        flex-shrink: 0;
      }
    }

    /* 中文排版增强 - 防止溢出与提升可读性 */
    .rilo-zh-page * {
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .field-label strong {
      line-height: 1.6;
    }

    /* === v5: Tailwind utility overrides === */
    /* 全局字体覆盖 */
    body, .ant-typography, .ant-btn, .ant-input, .ant-select, .ant-card, .ant-table {
      font-family: var(--font-sans), system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* Tailwind utility overrides (v5 palette) */
    .text-gray-500 { color: var(--ink-3) !important; }
    .text-gray-600 { color: var(--ink-2) !important; }
    .text-gray-800 { color: var(--ink-1) !important; }
    .text-sm { font-size: 0.875rem; line-height: 1.85; }
    .text-xs { font-size: 0.75rem; line-height: 1.85; color: var(--ink-3); }

    .bg-white { background: var(--paper-warm) !important; }
    .bg-gray-50 { background: var(--paper-base) !important; }
    .bg-gray-100 { background: var(--paper-warm) !important; }

    .border { border-color: var(--line) !important; }
    .border-2 { border-color: var(--line-strong) !important; }

    .rounded { border-radius: var(--radius-md) !important; }
    .rounded-lg { border-radius: var(--radius-lg) !important; }
    .rounded-xl { border-radius: var(--radius-xl) !important; }
    .rounded-2xl { border-radius: calc(var(--radius-lg) * 1.2) !important; }

    .shadow { box-shadow: var(--shadow-v5) !important; }
    .shadow-lg { box-shadow: 0 10px 40px rgba(85, 61, 28, 0.18) !important; }

    /* 卡片统一类（v5） */
    .rilo-card {
      background: var(--rilo-surface-card);
      border: 1px solid rgba(34, 31, 26, 0.11);
      border-radius: var(--radius-lg, 22px);
      box-shadow: var(--rilo-shadow-card);
      padding: var(--space-4, 28px);
    }

    .rilo-ledger-panel {
      background: var(--rilo-surface-panel);
      border: 1px solid rgba(34, 31, 26, 0.11);
      border-radius: calc(var(--radius-lg) * 1.05);
      box-shadow: var(--rilo-shadow-card);
      position: relative;
    }

    .rilo-ledger-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.34), transparent 32%);
      pointer-events: none;
    }

    .rilo-shell-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: clamp(22px, 2vw, 34px);
      align-items: start;
    }

    .rilo-shell-main {
      display: grid;
      gap: clamp(22px, 2vw, 34px);
    }

    .rilo-shell-side {
      min-width: 0;
    }

    .rilo-shell-side > * {
      min-width: 0;
    }

    .rilo-inspector-panel {
      position: sticky;
      top: 16px;
      display: grid;
      gap: 14px;
      padding: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.82), rgba(247,240,231,0.94)),
        linear-gradient(135deg, rgba(233,237,243,0.32), transparent 58%);
      border: 1px solid rgba(34, 31, 26, 0.12);
      border-radius: calc(var(--radius-lg) * 1.04);
      box-shadow: var(--rilo-shadow-card);
      overflow: hidden;
      isolation: isolate;
    }

    .rilo-inspector-panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 56px;
      background: linear-gradient(180deg, rgba(34, 28, 139, 0.07), transparent);
      pointer-events: none;
      z-index: -1;
    }

    .rilo-inspector-header {
      display: grid;
      gap: 10px;
      padding: 6px 4px 2px;
    }

    .rilo-inspector-kicker {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .rilo-inspector-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .rilo-inspector-section {
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(244,235,223,0.92));
      border: 1px solid rgba(34,31,26,0.10);
      border-radius: var(--radius-lg);
      box-shadow: var(--rilo-shadow-soft);
      overflow: hidden;
    }

    .rilo-inspector-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.32), rgba(244,235,223,0.82));
    }

    .rilo-inspector-section-body {
      padding: 14px 16px 16px;
      color: var(--rilo-text-2);
    }

    .rilo-explainer-card {
      position: relative;
      border: 1px solid rgba(34,31,26,0.10);
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, rgba(255,255,255,0.76), rgba(245,236,224,0.88));
      box-shadow: var(--rilo-shadow-soft);
      padding: 14px 15px;
      overflow: hidden;
    }

    .rilo-explainer-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, rgba(34, 28, 139, 0.42), rgba(34, 28, 139, 0));
    }

    .rilo-explainer-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 8px;
    }

    .rilo-explainer-title {
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--ink-1);
    }

    .rilo-explainer-copy {
      margin-top: 6px;
      font-size: 0.9rem;
      line-height: 1.82;
      color: var(--ink-2);
    }

    .rilo-kpi-strong {
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(244,235,223,0.96));
      border: 1px solid rgba(34,31,26,0.12);
      box-shadow: 0 16px 34px rgba(85, 61, 28, 0.10);
    }

    .rilo-card-hierarchy-high {
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(239,229,215,0.94));
      border-color: rgba(34,31,26,0.12) !important;
      box-shadow: 0 22px 44px rgba(85, 61, 28, 0.11) !important;
    }

    .rilo-card-hierarchy-mid {
      background: linear-gradient(180deg, rgba(255,255,255,0.68), rgba(244,235,223,0.90));
      border-color: rgba(34,31,26,0.10) !important;
      box-shadow: var(--rilo-shadow-soft) !important;
    }

    .is-hidden {
      display: none !important;
    }

    .rilo-control-grid {
      display: grid;
      gap: 18px;
    }

    .rilo-control-field {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(34,31,26,0.10);
      background: rgba(255,255,255,0.38);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22);
    }

    .rilo-btn-soft {
      border: 1px solid rgba(34,31,26,0.12);
      background: rgba(255,251,246,0.58);
      color: var(--rilo-accent);
      box-shadow: var(--rilo-shadow-soft);
    }

    .rilo-btn-soft:hover {
      border-color: rgba(34,28,139,0.20);
      background: rgba(236,236,250,0.68);
    }

    .rilo-btn-strong {
      border: 1px solid rgba(19,16,89,0.20);

      color: #f7f2ea;
      box-shadow: 0 12px 28px rgba(34,28,139,0.18);
    }

    .rilo-btn-strong:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(34,28,139,0.22);
    }

    @media (min-width: 1024px) {
      .rilo-shell-grid {
        grid-template-columns: minmax(0, 1.75fr) minmax(320px, 0.92fr);
      }
    }

    .rilo-ledger-header {
      display: grid;
      gap: 20px;
    }

    .rilo-ledger-header-copy {
      max-width: 780px;
    }

    .rilo-ledger-eyebrow {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .rilo-ledger-title {
      margin-top: 12px;
      font-family: var(--font-display), Georgia, serif;
      font-size: clamp(2rem, 3vw, 3.15rem);
      line-height: 1.04;
      letter-spacing: -0.04em;
      font-weight: 600;
      color: var(--ink-1);
    }

    .rilo-ledger-subtitle {
      margin-top: 12px;
      max-width: 68ch;
      font-size: 0.97rem;
      line-height: 1.9;
      color: var(--ink-2);
    }

    .rilo-ledger-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .rilo-ledger-metric {
      min-height: 92px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(34, 31, 26, 0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.56), rgba(248,242,235,0.86));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.32);
    }

    .rilo-ledger-metric-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .rilo-ledger-metric-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink-1);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .rilo-ledger-metric-note {
      font-size: 0.75rem;
      color: var(--ink-2);
    }

    .rilo-ledger-band {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .rilo-ledger-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 14px;
      border: 1px solid rgba(34, 31, 26, 0.10);
      border-radius: 999px;
      background: rgba(255,255,255,0.44);
      color: var(--ink-2);
      font-size: 0.8rem;
    }

    .rilo-ledger-pill strong {
      color: var(--ink-1);
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .rilo-ledger-metrics {
        grid-template-columns: 1fr;
      }
    }

    /* 标题字体（v5 衬线） */
    h1, h2, h3, h4, h5, h6, .page-title, .section-title {
      font-family: var(--font-display), Georgia, serif;
      color: var(--ink-1);
      letter-spacing: 0.02em;
    }

    .bg-success-light { background: var(--emerald-soft) !important; }
    .bg-warning-light { background: var(--amber-soft) !important; }
    .bg-danger-light { background: var(--brick-soft) !important; }

    /* KPI 卡片样式（v5） */
    .kpi-card {
      background: var(--rilo-surface-card);
      border: 1px solid rgba(34, 31, 26, 0.11);
      border-radius: var(--radius-lg);
      box-shadow: var(--rilo-shadow-card);
      padding: var(--space-4);
      text-align: left;
    }
    .kpi-card .kpi-title {
      font-size: 0.875rem;
      color: var(--ink-2);
      margin-bottom: var(--space-2);
      font-weight: 500;
    }
    .kpi-card .kpi-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink-1);
      line-height: 1.2;
    }
    .kpi-card .kpi-suffix {
      font-size: 0.875rem;
      color: var(--ink-3);
      margin-left: 2px;
    }

    /* Hover tooltip 术语提示 */
    .term-hover {
      border-bottom: 1px dotted var(--rilo-accent-v5);
      cursor: help;
    }

  </style>

<body>
  <!-- 应用根节点 -->
  <div id="root">
    <!-- 初始加载状态 -->
    <div class="min-h-screen bg-[var(--rilo-bg-deep)] flex items-center justify-center">
      <div class="bg-[var(--rilo-surface-1)] rounded-2xl shadow-xl p-8 text-center max-w-md border border-[var(--rilo-border-deep)]">
        <div class="text-6xl mb-4">🐾</div>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">宠物综合体经营测算</h1>
        <p class="text-gray-600 mb-6">v2.0 模块化版本</p>
        <div class="loading-spinner mx-auto mb-4"></div>
        <p class="text-sm text-gray-500">正在加载模块...</p>
      </div>
    </div>
    <!-- 版本号 -->
    <div class="fixed bottom-2 right-2 text-xs text-gray-400">v2.0.0</div>
  </div>

  <!-- 核心模块加载 -->
  <script>
    // 模块加载状态跟踪
    let loadedModules = 0;
    const totalModules = 60; // 实际加载的script数量
    
    function updateLoadingProgress() {
      loadedModules++;
      const progress = (loadedModules / totalModules) * 100;
      
      // 只在关键进度点显示日志
      if (loadedModules === 1 || loadedModules % 10 === 0 || loadedModules >= totalModules) {
        console.log(`📦 加载进度: ${progress.toFixed(0)}% (${loadedModules}/${totalModules})`);
      }
      
      // 更新页面加载指示器（如果存在）
      const loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator) {
        loadingIndicator.textContent = `加载中... ${progress.toFixed(0)}%`;
      }
      
      // 所有模块加载完成后，触发应用启动检查
      if (loadedModules >= totalModules && !window.modulesLoadComplete) {
        window.modulesLoadComplete = true;
        console.log('🎉 所有模块加载完成，启动应用...');
        setTimeout(() => {
          if (window.startApp) {
            window.startApp();
          }
        }, 300); // 给模块注册更多时间
      }
    }
    
    // 模块加载错误处理
    function handleModuleError(moduleName, error) {
      console.error(`模块 ${moduleName} 加载失败:`, error);
      document.getElementById('root').innerHTML = `
        <div class="min-h-screen bg-red-50 flex items-center justify-center p-4">
          <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md text-center">
            <div class="text-6xl mb-4">❌</div>
            <h2 class="text-xl font-bold text-red-600 mb-4">模块加载失败</h2>
            <p class="text-gray-600 mb-4">模块 <code>${moduleName}</code> 无法加载</p>
            <p class="text-sm text-gray-500 mb-6">请检查网络连接或联系技术支持</p>
            <button 
              class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors"
              onclick="window.location.reload()"
            >
              重新加载
            </button>
          </div>
        </div>
      `;
    }
  </script>

  <!-- 1. 数据管理核心 -->
  <script src="js/core/data-manager.js" onerror="handleModuleError('DataManager', event)" onload="updateLoadingProgress()"></script>
  
  <!-- 2. 公式引擎 -->
  <script src="js/core/formula-engine.js" onerror="handleModuleError('FormulaEngine', event)" onload="updateLoadingProgress()"></script>
  
  <!-- 3. 计算器引擎 (拆分后) -->
  <script src="js/core/calculators/revenue-calculator.js" onerror="handleModuleError('RevenueCalculator', event)" onload="updateLoadingProgress()"></script>

  <script src="js/components/settings/cost-settings.js" onerror="handleModuleError('CostSettings', event)" onload="updateLoadingProgress()"></script>
  
  <!-- 8. 自定义模块管理 (拆分后的业务模块) -->
  <script src="js/modules/business/module-editor.js" onerror="handleModuleError('ModuleEditor', event)" onload="updateLoadingProgress()"></script>

  <script src="js/modules/breakeven/index.js" onerror="handleModuleError('BreakevenAnalysis', event)" onload="updateLoadingProgress()"></script>
  
  <!-- 共享卡片组件库 -->
  <script src="js/shared/cards.js" onerror="handleModuleError('Cards', event)" onload="updateLoadingProgress()"></script>
  
  <!-- 10. 情景分析模块 (拆分后) -->
